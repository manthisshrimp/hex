services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: task-board-backend
    ports:
      - "3009:3000"
    volumes:
      - ./data:/data
      - ./backend:/app
      - /app/node_modules
      - /home/aldus/.octiron-api-key:/root/.octiron-api-key:ro
    environment:
      - PORT=3000
      - DATA_PATH=/data
      - HABITS_URL=http://host.docker.internal:3018
      - HABITS_SYNC_USER=aldus
      - OCTIRON_API_KEY_PATH=/root/.octiron-api-key
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: npm run dev

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev.frontend
    container_name: task-board-frontend
    ports:
      - "5179:5178"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
