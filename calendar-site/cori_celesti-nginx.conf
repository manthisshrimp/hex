# Calendar Site - cori_celesti Nginx Configuration
# Place this in: /etc/nginx/sites-available/calendar.dijibringabeeralong.co.za
# Then: ln -s /etc/nginx/sites-available/calendar.dijibringabeeralong.co.za /etc/nginx/sites-enabled/
# And: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name calendar.dijibringabeeralong.co.za;
    
    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name calendar.dijibringabeeralong.co.za;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/dijibringabeeralong.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dijibringabeeralong.co.za/privkey.pem;
    
    # SSL configuration
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy to calendar frontend on umbrel
    location / {
        proxy_pass http://10.227.6.155:5176;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # API proxy (alternative - directly to backend)
    # location /api/ {
    #     proxy_pass http://10.227.6.155:3006/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
}