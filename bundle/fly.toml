app = "jelly"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "octiron_data"
  destination = "/data"

[env]
  OCTIRON_API_KEY_PATH = "/data/.octiron-api-key"
