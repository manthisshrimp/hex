worker_processes 1;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    map $http_x_forwarded_proto $fwd_scheme {
        https   https;
        default $scheme;
    }

    server {
        listen 80;
        server_name _;

        # Service workers (no-cache)
        location = /calendar/sw.js  { alias /usr/share/nginx/html/calendar/sw.js;  add_header Cache-Control "no-cache, no-store, must-revalidate"; }
        location = /expenses/sw.js  { alias /usr/share/nginx/html/expenses/sw.js;  add_header Cache-Control "no-cache, no-store, must-revalidate"; }
        location = /inventory/sw.js { alias /usr/share/nginx/html/inventory/sw.js; add_header Cache-Control "no-cache, no-store, must-revalidate"; }
        location = /habits/sw.js    { alias /usr/share/nginx/html/habits/sw.js;    add_header Cache-Control "no-cache, no-store, must-revalidate"; }
        location = /todo/sw.js      { alias /usr/share/nginx/html/todo/sw.js;      add_header Cache-Control "no-cache, no-store, must-revalidate"; }
        location = /mood/sw.js      { alias /usr/share/nginx/html/mood/sw.js;      add_header Cache-Control "no-cache, no-store, must-revalidate"; }

        # Calendar
        location /calendar/api/ {
            proxy_pass         http://127.0.0.1:3006/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /calendar/ {
            alias   /usr/share/nginx/html/calendar/;
            try_files $uri $uri/ /calendar/index.html;
        }

        # Expenses
        location /expenses/api/ {
            proxy_pass         http://127.0.0.1:3002/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /expenses/ {
            alias   /usr/share/nginx/html/expenses/;
            try_files $uri $uri/ /expenses/index.html;
        }

        # Inventory
        location /inventory/api/ {
            proxy_pass         http://127.0.0.1:3003/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /inventory/ {
            alias   /usr/share/nginx/html/inventory/;
            try_files $uri $uri/ /inventory/index.html;
        }

        # Habits
        location /habits/api/ {
            proxy_pass         http://127.0.0.1:3010/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /habits/ {
            alias   /usr/share/nginx/html/habits/;
            try_files $uri $uri/ /habits/index.html;
        }

        # Task Board
        location /todo/api/ {
            proxy_pass         http://127.0.0.1:3009/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /todo/ {
            alias   /usr/share/nginx/html/todo/;
            try_files $uri $uri/ /todo/index.html;
        }

        # Mood
        location /mood/api/ {
            proxy_pass         http://127.0.0.1:3004/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /mood/ {
            alias   /usr/share/nginx/html/mood/;
            try_files $uri $uri/ /mood/index.html;
        }

        # Dashboard
        location /dashboard/ {
            proxy_pass         http://127.0.0.1:3005/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Utility
        location /health {
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        location = / {
            if ($host ~* "^calendar\.")  { return 302 $fwd_scheme://$host/calendar/; }
            if ($host ~* "^expenses\.")  { return 302 $fwd_scheme://$host/expenses/; }
            if ($host ~* "^inventory\.") { return 302 $fwd_scheme://$host/inventory/; }
            if ($host ~* "^habits\.")    { return 302 $fwd_scheme://$host/habits/; }
            if ($host ~* "^todo\.")      { return 302 $fwd_scheme://$host/todo/; }
            if ($host ~* "^mood\.")      { return 302 $fwd_scheme://$host/mood/; }
            return 302 $fwd_scheme://$host/dashboard/;
        }
    }
}
